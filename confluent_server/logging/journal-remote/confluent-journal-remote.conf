# Example systemd-journal-remote configuration for a confluent server to
# receive journal entries uploaded by deployed nodes (see the logging.servers
# and logging.method node attributes). The stock systemd-journal-remote unit
# only listens for HTTPS; this drop-in switches it to plain HTTP on port
# 19532, matching what systemd-journal-upload is configured for on the nodes.
#
# To activate (or run the confluent-logging-receiver-setup helper one
# directory up with "journal-remote --plain"):
#   dnf/zypper/apt install systemd-journal-remote
#   mkdir -p /etc/systemd/system/systemd-journal-remote.service.d
#   cp confluent-journal-remote.conf /etc/systemd/system/systemd-journal-remote.service.d/confluent.conf
#   systemctl daemon-reload
#   systemctl enable --now systemd-journal-remote.socket
# and permit the port through the firewall, e.g. on a firewalld based system:
#   firewall-cmd --permanent --add-port=19532/tcp && firewall-cmd --reload
#
# Received entries are written to
# /var/log/journal/remote/remote-<node>.journal and can be read with:
#   journalctl -D /var/log/journal/remote

[Service]
ExecStart=
ExecStart=/usr/lib/systemd/systemd-journal-remote --listen-http=-3 --output=/var/log/journal/remote/
