# Example rsyslog configuration for a confluent server to receive syslog
# forwarded by deployed nodes (see the logging.servers node attribute) and
# write per-node logs under /var/log/confluent/nodes/
#
# To activate:
#   cp confluent-nodes.conf /etc/rsyslog.d/confluent-nodes.conf
#   systemctl restart rsyslog
# and permit syslog through the firewall, e.g. on a firewalld based system:
#   firewall-cmd --permanent --add-service=syslog && firewall-cmd --reload
#
# Note: on systems where rsyslogd does not run as root (e.g. Ubuntu runs it
# as the "syslog" user), ensure that user may create and write
# /var/log/confluent/nodes
#
# The per-node logs can grow large; see confluent-nodes.logrotate for an
# example logrotate configuration that rotates and compresses them.
#
# Logs are filed by the sender identity as determined by this server
# (resolution of the peer address, falling back to the address itself), not
# by the client-supplied hostname, so nodes cannot trivially inject entries
# into each other's logs.

module(load="imudp")
input(type="imudp" port="514" ruleset="confluentnodes")

template(name="confluentnodelog" type="string"
         string="/var/log/confluent/nodes/%FROMHOST%.log")

ruleset(name="confluentnodes") {
    action(type="omfile" dynaFile="confluentnodelog"
           dirCreateMode="0700" fileCreateMode="0600")
}
