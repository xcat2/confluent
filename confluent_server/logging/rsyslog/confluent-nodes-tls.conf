# Example rsyslog configuration for a confluent server to receive TLS
# encrypted syslog forwarded by deployed nodes (see the logging.servers and
# logging.tls node attributes) and write per-node logs under
# /var/log/confluent/nodes/. Clients are mutually authenticated: only nodes
# presenting a certificate issued by the confluent certificate authority are
# accepted.
#
# The confluent-logging-receiver-setup helper in this examples directory
# generates the referenced certificate material and installs this file; to
# activate manually, provide the key/cert/CA files below, then:
#   cp confluent-nodes-tls.conf /etc/rsyslog.d/confluent-nodes.conf
#   systemctl restart rsyslog
# and permit TCP port 6514 through the firewall, e.g. on a firewalld based
# system:
#   firewall-cmd --permanent --add-port=6514/tcp && firewall-cmd --reload
#
# The TLS stream driver requires the rsyslog-openssl (driver "ossl") or
# rsyslog-gnutls (driver "gtls") module to be installed.
#
# Note: on systems where rsyslogd does not run as root (e.g. Ubuntu runs it
# as the "syslog" user), ensure that user may read the certificate material
# and may create and write /var/log/confluent/nodes
#
# The per-node logs can grow large; see confluent-nodes.logrotate for an
# example logrotate configuration that rotates and compresses them.

global(DefaultNetstreamDriver="ossl"
       DefaultNetstreamDriverCAFile="/etc/rsyslog.d/confluent-tls/ca.pem"
       DefaultNetstreamDriverCertFile="/etc/rsyslog.d/confluent-tls/rsyslog.crt"
       DefaultNetstreamDriverKeyFile="/etc/rsyslog.d/confluent-tls/rsyslog.key")

module(load="imtcp" StreamDriver.Name="ossl" StreamDriver.Mode="1"
       StreamDriver.AuthMode="x509/certvalid")
input(type="imtcp" port="6514" ruleset="confluentnodes")

template(name="confluentnodelog" type="string"
         string="/var/log/confluent/nodes/%HOSTNAME%.log")

ruleset(name="confluentnodes") {
    action(type="omfile" dynaFile="confluentnodelog"
           dirCreateMode="0700" fileCreateMode="0600")
}
